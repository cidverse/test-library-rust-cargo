    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          disable-telemetry: true
          egress-policy: "${{ env.EGRESS_POLICY }}"
          allowed-endpoints: >-
            github.com:443
            api.github.com:443
            codeload.github.com:443
            uploads.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Prepare Tooling
        shell: bash
        run: bash .cid/scripts/install.sh "0.9.0" ""
      - name: Action - cargo-build [test-library-rust-cargo]
        env:
          CID_WORKFLOW: "${{ env.CID_WORKFLOW }}"
          CID_LOGLEVEL: "${{ env.CID_LOGLEVEL }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          cid --log-level=${CID_LOGLEVEL:-info} plan execute --state-file ".cid/state-github.json" --state-wf-name "release" --step "cargo-build-test-library-rust-cargo"
