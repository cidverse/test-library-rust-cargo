          path: ".dist/changelog-generate"
        continue-on-error: true
      - name: Action - github-release-publish
        env:
          CID_WORKFLOW: "${{ env.CID_WORKFLOW }}"
          CID_LOGLEVEL: "${{ env.CID_LOGLEVEL }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          cid --log-level=${CID_LOGLEVEL:-info} plan execute --state-file ".cid/state-github.json" --state-wf-name "release" --step "github-release-publish"
      - name: Upload Outputs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "github-release-publish-${{ github.run_id }}"
          path: ".dist/github-release-publish/"
          retention-days: 1
          if-no-files-found: ignore
          compression-level: 6
          include-hidden-files: true
